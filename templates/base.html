{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">

  <title>EssayScorer AI - Professional English Essay Assessment</title>
  <meta content="Advanced English Essay Scoring using Machine Learning and Deep Learning" name="description">
  <meta content="essay scoring, machine learning, deep learning, automated assessment" name="keywords">

  <!-- Favicons -->
  <link href="{% static 'assets/img/favicon.png' %}" rel="icon">
  <link href="{% static 'assets/img/apple-touch-icon.png' %}" rel="apple-touch-icon">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Vendor CSS Files -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link href="{% static 'assets/vendor/aos/aos.css' %}" rel="stylesheet">
  
  <!-- Custom Premium CSS -->
  <link href="{% static 'assets/css/premium.css' %}" rel="stylesheet">

  <style>
    /* Inline overrides if necessary */
    .navbar-brand span {
        font-family: 'Outfit', sans-serif;
        font-weight: 700;
        background: linear-gradient(135deg, var(--text-main) 0%, var(--primary) 100%);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
    }
  </style>
</head>

<body>

  <!-- ======= Header ======= -->
  <header id="header" class="navbar navbar-expand-lg navbar-dark navbar-custom fixed-top">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center" href="{% url 'index' %}">
        <i class="bi bi-cpu-fill me-2 fs-3 text-primary"></i>
        <span>EssayScorer AI</span>
      </a>

      <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
        <i class="bi bi-list fs-2 text-white"></i>
      </button>

      <nav class="collapse navbar-collapse" id="navbarContent">
        <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-center">
          <li class="nav-item"><a class="nav-link {% if request.resolver_match.url_name == 'index' %}active{% endif %}" href="{% url 'index' %}">Home</a></li>
          <li class="nav-item"><a class="nav-link {% if request.resolver_match.url_name == 'AdminLogin' %}active{% endif %}" href="{% url 'AdminLogin' %}">Admin Portal</a></li>
          <li class="nav-item"><a class="nav-link {% if request.resolver_match.url_name == 'UserLogin' %}active{% endif %}" href="{% url 'UserLogin' %}">User Portal</a></li>
          <li class="nav-item ms-lg-3">
            <a class="btn btn-premium" href="{% url 'UserRegister' %}">Register Portal</a>
          </li>
        </ul>
      </nav>
    </div>
  </header><!-- End Header -->

  <main id="main">
    {% block contents %}
    {% endblock %}
  </main>

  <!-- ======= Footer ======= -->
  <footer id="footer" class="py-5 mt-5">
    <div class="container text-center text-muted border-top pt-4">
      <p>&copy; 2026 EssayScorer AI. All rights reserved.</p>
      <div class="d-flex justify-content-center gap-3 fs-5">
        <i class="bi bi-twitter-x"></i>
        <i class="bi bi-linkedin"></i>
        <i class="bi bi-github"></i>
      </div>
    </div>
  </footer><!-- End Footer -->

  <a href="#" class="back-to-top d-flex align-items-center justify-content-center"><i class="bi bi-arrow-up-short"></i></a>

  <!-- Vendor JS Files -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{% static 'assets/vendor/aos/aos.js' %}"></script>
  <script src="{% static 'assets/js/main.js' %}"></script>

  <script>
    AOS.init({
      duration: 1000,
      easing: 'ease-in-out',
      once: true,
      mirror: false
    });
  </script>

</body>

</html>
