{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Admin Portal - EssayScorer AI</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Vendor CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    
    <!-- Custom Premium CSS -->
    <link href="{% static 'assets/css/premium.css' %}" rel="stylesheet">

    <style>
        .navbar-brand span {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            background: linear-gradient(135deg, var(--text-main) 0%, var(--primary) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .admin-header {
            padding: 100px 0 40px;
        }
        .admin-sidebar-item.active {
            color: var(--primary) !important;
            border-left: 3px solid var(--primary);
            padding-left: 10px;
        }
    </style>
</head>
<body>
    <div class="bg-mesh"></div>

    <header id="header" class="navbar navbar-expand-lg navbar-dark navbar-custom fixed-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="{% url 'AdminHome' %}">
                <i class="bi bi-shield-lock-fill me-2 fs-3 text-primary"></i>
                <span>Admin Portal</span>
            </a>

            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
                <i class="bi bi-list fs-2 text-primary"></i>
            </button>

            <nav class="collapse navbar-collapse" id="navbarContent">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-center">
                    <li class="nav-item"><a class="nav-link {% if request.resolver_match.url_name == 'AdminHome' %}active{% endif %}" href="{% url 'AdminHome' %}">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link {% if request.resolver_match.url_name == 'RegisterUsersView' %}active{% endif %}" href="{% url 'RegisterUsersView' %}">User Management</a></li>
                    <li class="nav-item ms-lg-3">
                        <a class="btn btn-outline-primary btn-sm rounded-pill px-3" href="{% url 'index' %}">
                            <i class="bi bi-power me-1"></i> Logout
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="container admin-header mt-5">
        <div class="text-center animate-fade-in">
            <h1 class="display-5 fw-bold gradient-text">System Administration</h1>
            <p class="text-muted">Global control and user oversight for EssayScorer AI.</p>
        </div>
    </div>

    <main class="container py-4">
        <div class="row">
            <div class="col-12">
                <div class="glass-card p-4">
                    {% block contents %}
                    {% endblock %}
                </div>
            </div>
        </div>
    </main>

    <footer class="py-5 mt-5">
        <div class="container text-center text-muted border-top pt-4">
            <p>&copy; 2026 EssayScorer AI Administration. System Secure.</p>
        </div>
    </footer>

    <!-- Bootstrap 5 Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
