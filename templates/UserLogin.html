{% extends 'base.html' %}
{% load static %}

{% block contents %}
<section class="hero-gradient min-vh-100 d-flex align-items-center">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5 animate-fade-in">
                <div class="glass-card p-5">
                    <div class="text-center mb-5">
                        <div class="d-inline-block bg-primary bg-opacity-10 text-primary fs-1 rounded-circle p-4 mb-4">
                            <i class="bi bi-person-badge-fill"></i>
                        </div>
                        <h2 class="fw-bold gradient-text">User Login</h2>
                        <p class="text-muted">Welcome back! Please enter your credentials.</p>
                    </div>

                    <form action="{% url 'UserLoginCheck' %}" method="POST">
                        {% csrf_token %}
                        <div class="mb-4">
                            <label class="form-label text-muted small text-uppercase fw-bold">Login ID</label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent border-end-0">
                                    <i class="bi bi-person text-primary"></i>
                                </span>
                                <input type="text" class="form-control form-control-premium border-start-0" name="loginid" required placeholder="Enter your ID">
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label text-muted small text-uppercase fw-bold">Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent border-end-0">
                                    <i class="bi bi-lock text-primary"></i>
                                </span>
                                <input type="password" class="form-control form-control-premium border-start-0" name="pswd" required placeholder="Enter your password">
                            </div>
                        </div>

                        {% if messages %}
                        <div class="mb-4">
                            {% for message in messages %}
                            <div class="alert alert-danger bg-opacity-10 border-0 text-danger py-2 px-3 small rounded-3">
                                <i class="bi bi-exclamation-triangle-fill me-2"></i> {{ message }}
                            </div>
                            {% endfor %}
                        </div>
                        {% endif %}

                        <div class="d-grid gap-3 pt-2">
                            <button type="submit" class="btn btn-premium btn-lg w-100">Sign In</button>
                            <div class="text-center mt-3">
                                <span class="text-muted small">Don't have an account?</span>
                                <a href="{% url 'UserRegister' %}" class="text-primary small fw-bold text-decoration-none ms-1">Register Now</a>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
